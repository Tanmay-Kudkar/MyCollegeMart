spring.application.name=backend
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Server
server.port=${SERVER_PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
server.forward-headers-strategy=framework
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# PostgreSQL datasource (env injected)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mycollegemart}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always
spring.sql.init.schema-locations=optional:file:../database/schema.sql,optional:file:./database/schema.sql

# Persistence defaults
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false

# Connection pool defaults
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Auth
google.clientId=${MYCOLLEGEMART_GOOGLE_CLIENT_ID:}
google.clientSecret=${MYCOLLEGEMART_GOOGLE_CLIENT_SECRET:}
google.redirectUri=${MYCOLLEGEMART_GOOGLE_REDIRECT_URI:}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}
jwt.secret=${JWT_SECRET:dev-only-secret-key-change-me-1234567890abcd}
jwt.expiration=${JWT_EXPIRATION:36000000}
app.admin.emails=${APP_ADMIN_EMAILS:}
app.master.email=${APP_MASTER_EMAIL:master@mycollegemart.com}
app.master.password=${APP_MASTER_PASSWORD:mycollegemart}

# Payments
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

# Multipart uploads (media in DB)
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:100MB}

# Logging
logging.level.org.springframework=INFO
logging.level.com.mycollegemart.backend=INFO

# AI chat (OpenAI-compatible provider; free OpenRouter model by default)
ai.chat.base-url=${AI_CHAT_BASE_URL:https://openrouter.ai/api/v1}
ai.chat.api-key=${AI_CHAT_API_KEY:}
ai.chat.model=${AI_CHAT_MODEL:}
ai.chat.referer=${AI_CHAT_REFERER:http://localhost:3000}
ai.chat.app-name=${AI_CHAT_APP_NAME:MyCollegeMart}
ai.chat.timeout-ms=${AI_CHAT_TIMEOUT_MS:30000}